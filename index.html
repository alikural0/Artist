<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f172a">

<link rel="apple-touch-icon" href="./icon-192.png">

<title>Artist Sahne</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#0f172a;
    color:white;
}

.container {
    max-width:600px;
    margin:auto;
    padding:20px;
}

.btn-img {
    width:100%;
    margin-top:14px;
    border-radius:18px;
    cursor:pointer;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
}

input, select {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin:6px 0;
    background:#334155;
    color:white;
}

.hidden { display:none; }

.result { padding:15px; border-radius:10px; text-align:center; }
.green { background:#166534; }
.red { background:#7f1d1d; }
</style>
</head>

<body>

<div class="container">

<div id="menu">
<h1 style="text-align:center;">🎭 Artist Sahne</h1>

<img src="./btn-oyun.png" class="btn-img" onclick="go('oyun')">
<img src="./btn-hesap.png" class="btn-img" onclick="go('hesap')">
<img src="./btn-rapor.png" class="btn-img" onclick="go('rapor')">
</div>

<div id="oyun" class="hidden">
<h2>Oyunlar</h2>
<input id="oyunInput" placeholder="Oyun adı">
<button onclick="addGame()">Ekle</button>
<div id="oyunListe"></div>
<button onclick="go('menu')">Geri</button>
</div>

<div id="hesap" class="hidden">
<h2>Hesaplama</h2>

<select id="oyunSelect"></select>

<input id="price" placeholder="Bilet fiyatı">
<input id="sold" placeholder="Satılan">
<input id="capacity" placeholder="Kapasite">

<input id="equip" placeholder="Ekipman">
<input id="assistant" placeholder="Asistan">
<input id="rent" placeholder="Kira">

<button onclick="hesapla()">Hesapla</button>
<button onclick="kaydet()">Kaydet</button>

<div id="sonuc"></div>

<button onclick="go('menu')">Geri</button>
</div>

<div id="rapor" class="hidden">
<h2>Raporlar</h2>
<div id="raporListe"></div>
<button onclick="go('menu')">Geri</button>
</div>

</div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}

let oyunlar = JSON.parse(localStorage.getItem("oyunlar")) || [];
let raporlar = JSON.parse(localStorage.getItem("raporlar")) || [];
let sonHesap = null;

function go(id){
    ["menu","oyun","hesap","rapor"].forEach(x=>{
        document.getElementById(x).classList.add("hidden");
    });
    document.getElementById(id).classList.remove("hidden");

    if(id==="hesap") loadSelect();
    if(id==="rapor") loadReports();
}

// OYUN
function addGame(){
    let val = document.getElementById("oyunInput").value.trim();
    if(!val) return;
    oyunlar.push(val);
    localStorage.setItem("oyunlar", JSON.stringify(oyunlar));
    loadGames();
}

function loadGames(){
    let el = document.getElementById("oyunListe");
    el.innerHTML="";
    oyunlar.forEach((o,i)=>{
        el.innerHTML += `<div class="card">${o} <button onclick="deleteGame(${i})">Sil</button></div>`;
    });
}

function deleteGame(i){
    oyunlar.splice(i,1);
    localStorage.setItem("oyunlar", JSON.stringify(oyunlar));
    loadGames();
}

function loadSelect(){
    let s = document.getElementById("oyunSelect");
    s.innerHTML="";
    oyunlar.forEach(o=>{
        s.innerHTML += `<option>${o}</option>`;
    });
}

// HESAP FIX
function hesapla(){
    let price = +document.getElementById("price").value || 0;
    let sold = +document.getElementById("sold").value || 0;
    let cap = +document.getElementById("capacity").value || 0;

    let equip = +document.getElementById("equip").value || 500;
    let assistant = +document.getElementById("assistant").value || 0;
    let rent = +document.getElementById("rent").value || 0;

    let gider = equip + assistant + rent + 7000;
    let gelir = price * sold;
    let kar = gelir - gider;

    sonHesap = {
        oyun: document.getElementById("oyunSelect").value,
        kar
    };

    document.getElementById("sonuc").innerHTML =
        `<div class="result ${kar>=0?"green":"red"}">Kar: ${kar.toLocaleString("tr-TR")} ₺</div>`;
}

function kaydet(){
    if(!sonHesap) return;
    raporlar.unshift(sonHesap);
    localStorage.setItem("raporlar", JSON.stringify(raporlar));
}

// RAPOR
function loadReports(){
    let el = document.getElementById("raporListe");
    el.innerHTML="";
    raporlar.forEach(r=>{
        el.innerHTML += `<div class="card">${r.oyun} - ${r.kar} ₺</div>`;
    });
}

loadGames();
</script>

</body>
</html>
